name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    branches: [main]
    # Publish semver tags as releases.
    tags: ['v*.*.*']
    paths-ignore:
      - '.github/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Mint the OIDC token and write the build provenance attestation.
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          build-args: |
            "API_URL=https://felkeres.bsstudio.hu"
            "AUTHSCH_CLIENT_ID=60451969490994503646"
            "BSS_CLIENT_ID=Yn93BqJIJX6u5B0wbh0ufuuNPx64piMMKRZBP7iQ"
            "GOOGLE_CLIENT_ID=593937386712-8pu2vh1ukq17oidh9f4snkjf9oa88tvb.apps.googleusercontent.com"
            "MICROSOFT_CLIENT_ID=0e576fd5-f891-4e67-8738-38eabe902271"
            "SENTRY_URL=https://5d84e5aa35114e5bbe49ca9b8a013440@o354977.ingest.sentry.io/5989036"
            "SENTRY_URL_ADMIN=https://7465a5ea2a94e1a874b64fd3c71f920a@o354977.ingest.sentry.io/4506152601845760"
            "TURNSTILE_SITE_KEY=0x4AAAAAACoVmrCiCNRaI98A"
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Generate a build provenance attestation for the published image except on
      # PRs. Stored as an OCI referrer (no extra tags) and shown under the repo's
      # Attestations. Verify with:
      #   gh attestation verify oci://ghcr.io/bsstudio/request-manager:main --owner BSStudio
      # https://github.com/actions/attest-build-provenance
      - name: Attest build provenance
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
