name: Docker

on:
  push:
    branches: [main]
    # Publish semver tags as releases.
    tags: ['v*.*.*']
    paths-ignore:
      - '.github/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Mint the OIDC token and write the build provenance attestation.
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          build-args: |
            "API_URL=https://felkeres.bsstudio.hu"
            "AUTHSCH_CLIENT_ID=60451969490994503646"
            "BSS_CLIENT_ID=Yn93BqJIJX6u5B0wbh0ufuuNPx64piMMKRZBP7iQ"
            "GOOGLE_CLIENT_ID=593937386712-8pu2vh1ukq17oidh9f4snkjf9oa88tvb.apps.googleusercontent.com"
            "MICROSOFT_CLIENT_ID=0e576fd5-f891-4e67-8738-38eabe902271"
            "SENTRY_URL=https://5d84e5aa35114e5bbe49ca9b8a013440@o354977.ingest.sentry.io/5989036"
            "SENTRY_URL_ADMIN=https://7465a5ea2a94e1a874b64fd3c71f920a@o354977.ingest.sentry.io/4506152601845760"
            "TURNSTILE_SITE_KEY=0x4AAAAAACoVmrCiCNRaI98A"
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance handled by the attest step below; buildkit's own
          # attestations would push untagged "unknown/unknown" manifests to ghcr.
          provenance: false
          sbom: false

      - name: Attest build provenance
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          # Keep the attestation in GitHub's store only; pushing to ghcr would add
          # an untagged referrer artifact. Verify with:
          #   gh attestation verify oci://<image> --owner BSStudio
          push-to-registry: false
