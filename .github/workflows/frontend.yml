name: Frontend CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  run-tests:
    name: Run tests
    uses: ./.github/workflows/frontend-base-workflow.yml
    with:
      working-directory: 'frontend'
